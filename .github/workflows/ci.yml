name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    name: Shellcheck
    steps:
      - uses: actions/checkout@v4
      - name: Run Shellcheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: '.'
          severity: 'warning'
          ignore_paths: 'shell/shell-zsh'
        env:
          SHELLCHECK_OPTS: '-e SC1091 -e SC2155 -e SC2043'

  shfmt:
    runs-on: ubuntu-latest
    name: Shell Format Check
    steps:
      - uses: actions/checkout@v4
      - name: Install shfmt
        run: |
          curl -sL https://github.com/mvdan/sh/releases/download/v3.10.0/shfmt_v3.10.0_linux_amd64 -o shfmt
          chmod +x shfmt
          sudo mv shfmt /usr/local/bin/
      - name: Check shell script formatting
        run: |
          find . -name "*.sh" -not -path "./.git/*" -print0 | xargs -0 -r shfmt -d -i 4 -ci

  test:
    runs-on: ubuntu-latest
    name: Basic Tests
    env:
      TERM: dumb
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y stow
      - name: Test stow-posix.sh help
        run: ./stow-posix.sh --help
      - name: Test stow-posix.sh status
        run: ./stow-posix.sh status
